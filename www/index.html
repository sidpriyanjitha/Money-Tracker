<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Tracker Pro</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="top-bar">
        <h1>Money Tracker</h1>
        <div class="top-actions">
          <span id="userEmail" class="user-email hidden"></span>
          <button id="logoutBtn" class="secondary-btn hidden" type="button">
            Log out
          </button>
          <button id="themeToggleBtn" class="theme-btn" type="button">
            <i class="fa-solid fa-moon"></i>
            <span class="sr-only">Toggle theme</span>
          </button>
        </div>
      </div>

      <div id="authCard" class="card auth-card">
        <h2 class="section-title">Log in</h2>
        <form id="authForm">
          <div class="auth-grid">
            <input
              type="email"
              id="emailInput"
              placeholder="Email"
              autocomplete="email"
              required
            />

            <input
              type="password"
              id="passwordInput"
              placeholder="Password"
              autocomplete="current-password"
              required
              minlength="6"
            />

            <button type="submit" id="loginBtn">Log in</button>

            <button type="button" id="signupBtn" class="secondary-btn">
              Sign up
            </button>
          </div>
        </form>

        <p class="helper-text">
          Create an account first, then your transactions stay private to your login.
        </p>
      </div>

      <div class="message" id="message"></div>

      <div id="appShell" class="hidden">
        <div class="card">
          <form id="moneyForm">
            <div class="form-grid">
              <input
                type="text"
                id="titleInput"
                placeholder="Enter title"
                required
              />

              <textarea
                id="descriptionInput"
                placeholder="Enter description"
                rows="3"
              ></textarea>

              <input
                type="number"
                id="amountInput"
                placeholder="Enter amount"
                required
                step="0.01"
              />

              <select id="typeInput" required>
                <option value="">Select type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>

              <input type="date" id="dateInput" required />

              <button type="submit">Add</button>
            </div>
          </form>
        </div>

      <div class="summary">
        <div class="summary-box">
          <h3>Total Income</h3>
          <p class="income" id="incomeTotal">$0.00</p>
        </div>

        <div class="summary-box">
          <h3>Total Expense</h3>
          <p class="expense" id="expenseTotal">$0.00</p>
        </div>

        <div class="summary-box">
          <h3>Balance</h3>
          <p class="balance" id="balanceTotal">$0.00</p>
        </div>
      </div>

     <!--<div class="summary monthly-summary">
        <div class="summary-box">
          <h3>This Month Income</h3>
          <p class="income" id="monthIncomeTotal">$0.00</p>
        </div>

        <div class="summary-box">
          <h3>This Month Expense</h3>
          <p class="expense" id="monthExpenseTotal">$0.00</p>
        </div>

        <div class="summary-box">
          <h3>This Month Balance</h3>
          <p class="balance" id="monthBalanceTotal">$0.00</p>
        </div>
      </div> --> 

      <div class="card">
        <div class="toolbar">
          <input
            type="text"
            id="searchInput"
            placeholder="Search title or description..."
          />

          <select id="filterType">
            <option value="all">All Types</option>
            <option value="income">Income Only</option>
            <option value="expense">Expense Only</option>
          </select>

          <input type="month" id="filterMonth" aria-label="Filter by month" />

          <button type="button" id="clearFiltersBtn" class="secondary-btn">
            Clear
          </button>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title">Transactions</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="transactionList">
              <tr>
                <td colspan="5" class="empty-text">Loading transactions...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal hidden" id="editModal">
      <div class="modal-box">
        <h2>Edit Transaction</h2>

        <form id="editForm">
          <input type="hidden" id="editId" />

          <div class="edit-grid">
            <div>
              <label for="editTitle">Title</label>
              <input type="text" id="editTitle" required />
            </div>

            <div class="edit-field-full">
              <label for="editDescription">Description</label>
              <textarea id="editDescription" rows="3"></textarea>
            </div>

            <div>
              <label for="editAmount">Amount</label>
              <input type="number" id="editAmount" step="0.01" required />
            </div>

            <div>
              <label for="editType">Type</label>
              <select id="editType" required>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>

            <div>
              <label for="editDate">Date</label>
              <input type="date" id="editDate" required />
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" id="editCancelBtn" class="secondary-btn">
              Cancel
            </button>
            <button type="submit">Update Record</button>
          </div>
        </form>
      </div>
    </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
